<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Focus RPG Admin Monitoring</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #1c1c1f;
        --panel: #282830;
        --border: #3d3d4a;
        --text: #cdd2dc;
        --accent: #5383e8;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: Inter, system-ui, sans-serif;
        background: var(--bg);
        color: var(--text);
      }

      main {
        max-width: 960px;
        margin: 0 auto;
        padding: 32px 20px 64px;
      }

      h1 {
        margin: 0 0 8px;
        color: #fff;
      }

      p {
        color: #9aa0ae;
      }

      section {
        margin-top: 24px;
        padding: 20px;
        border: 1px solid var(--border);
        border-radius: 16px;
        background: var(--panel);
      }

      label {
        display: block;
        margin-bottom: 8px;
        font-size: 14px;
        font-weight: 600;
      }

      textarea,
      button {
        width: 100%;
        border-radius: 12px;
        border: 1px solid var(--border);
        background: #1c1c1f;
        color: #fff;
        font: inherit;
      }

      textarea {
        padding: 12px 14px;
        min-height: 120px;
        resize: vertical;
      }

      button {
        margin-top: 12px;
        padding: 12px 16px;
        background: var(--accent);
        border: none;
        font-weight: 700;
        cursor: pointer;
      }

      button:hover {
        filter: brightness(1.08);
      }

      .status {
        margin-top: 12px;
        min-height: 20px;
        font-size: 14px;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Focus RPG Admin Monitoring</h1>
      <p>Firestore `settings/banner` 문서를 수정해 메인 페이지 전광판을 업데이트합니다.</p>

      <section>
        <h2>패치노트 전광판</h2>
        <label for="bannerText">배너 텍스트</label>
        <textarea
          id="bannerText"
          placeholder="예: v1.2.0 업데이트: 신규 보스 층 추가, 밸런스 조정"
        ></textarea>
        <button id="updateBannerBtn" type="button">배너 업데이트</button>
        <div id="bannerStatus" class="status"></div>
      </section>
    </main>

    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js";
      import {
        getFirestore,
        doc,
        getDoc,
        setDoc,
        serverTimestamp,
      } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore.js";

      const firebaseConfig = {
        apiKey: "AIzaSyALVVWopHFZzOAd4wqfXQCJJMHNUMk0rd0",
        authDomain: "focusrpg-10da6.firebaseapp.com",
        databaseURL:
          "https://focusrpg-10da6-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "focusrpg-10da6",
        storageBucket: "focusrpg-10da6.firebasestorage.app",
        messagingSenderId: "666978949137",
        appId: "1:666978949137:web:b8946689cd8b287b9df9b0",
        measurementId: "G-K25TTT9PVC",
      };

      const app = initializeApp(firebaseConfig);
      const db = getFirestore(app);

      async function loadBanner() {
        const snapshot = await getDoc(doc(db, "settings", "banner"));
        if (!snapshot.exists()) {
          return;
        }

        const data = snapshot.data();
        document.getElementById("bannerText").value =
          data.text || data.message || data.content || "";
      }

      document.getElementById("updateBannerBtn").addEventListener("click", async () => {
        const status = document.getElementById("bannerStatus");
        const text = document.getElementById("bannerText").value.trim();

        if (!text) {
          status.textContent = "배너 텍스트를 입력해 주세요.";
          return;
        }

        try {
          await setDoc(
            doc(db, "settings", "banner"),
            {
              text,
              enabled: true,
              updatedAt: serverTimestamp(),
            },
            { merge: true },
          );
          status.textContent = "배너가 업데이트되었습니다.";
        } catch (error) {
          status.textContent =
            error instanceof Error ? error.message : "배너 업데이트에 실패했습니다.";
        }
      });

      loadBanner().catch((error) => {
        document.getElementById("bannerStatus").textContent =
          error instanceof Error ? error.message : "배너를 불러오지 못했습니다.";
      });
    </script>
  </body>
</html>
