<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Focus RPG Admin Monitoring</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #1c1c1f;
        --panel: #282830;
        --border: #3d3d4a;
        --text: #cdd2dc;
        --accent: #5383e8;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: Inter, system-ui, sans-serif;
        background: var(--bg);
        color: var(--text);
      }

      main {
        max-width: 960px;
        margin: 0 auto;
        padding: 32px 20px 64px;
      }

      h1 {
        margin: 0 0 8px;
        color: #fff;
      }

      h2 {
        margin: 0 0 16px;
        color: #fff;
        font-size: 1.125rem;
      }

      p {
        color: #9aa0ae;
        line-height: 1.6;
      }

      section {
        margin-top: 24px;
        padding: 20px;
        border: 1px solid var(--border);
        border-radius: 16px;
        background: var(--panel);
      }

      .locale-grid {
        display: grid;
        gap: 16px;
      }

      @media (min-width: 640px) {
        .locale-grid {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }
      }

      .locale-card {
        display: flex;
        flex-direction: column;
        gap: 8px;
        padding: 14px;
        border: 1px solid var(--border);
        border-radius: 14px;
        background: #1c1c1f;
      }

      .locale-card label {
        display: flex;
        align-items: center;
        gap: 8px;
        margin: 0;
        font-size: 14px;
        font-weight: 700;
        color: #fff;
      }

      .locale-card .flag {
        font-size: 1.25rem;
        line-height: 1;
      }

      .locale-card .code {
        margin-left: auto;
        font-size: 11px;
        font-weight: 600;
        letter-spacing: 0.08em;
        color: #9aa0ae;
      }

      textarea {
        width: 100%;
        min-height: 96px;
        padding: 12px 14px;
        border: 1px solid var(--border);
        border-radius: 12px;
        background: #121216;
        color: #fff;
        font: inherit;
        resize: vertical;
      }

      textarea:focus {
        outline: none;
        border-color: rgba(83, 131, 232, 0.65);
        box-shadow: 0 0 0 3px rgba(83, 131, 232, 0.15);
      }

      button {
        width: 100%;
        margin-top: 20px;
        padding: 14px 16px;
        border: none;
        border-radius: 12px;
        background: var(--accent);
        color: #fff;
        font: inherit;
        font-weight: 700;
        cursor: pointer;
      }

      button:hover {
        filter: brightness(1.08);
      }

      button:disabled {
        opacity: 0.65;
        cursor: wait;
      }

      .status {
        margin-top: 12px;
        min-height: 20px;
        font-size: 14px;
      }

      .status.error {
        color: #fca5a5;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Focus RPG Admin Monitoring</h1>
      <p>
        Firestore <code>settings/banner</code> 문서에 8개 언어 공지를 저장합니다.
        웹사이트 전광판은 유저가 선택한 언어에 맞는 텍스트를 표시하고, 비어 있으면
        한국어(ko)로 대체합니다.
      </p>

      <section>
        <h2>패치노트 전광판 (8개 국어)</h2>
        <form id="bannerForm" class="locale-grid"></form>
        <button id="updateBannerBtn" type="button">배너 업데이트</button>
        <div id="bannerStatus" class="status"></div>
      </section>
    </main>

    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js";
      import {
        getFirestore,
        doc,
        getDoc,
        setDoc,
        serverTimestamp,
      } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore.js";

      const BANNER_LOCALES = [
        { code: "ko", flag: "🇰🇷", label: "한국어" },
        { code: "en", flag: "🇺🇸", label: "English" },
        { code: "ja", flag: "🇯🇵", label: "日本語" },
        { code: "vi", flag: "🇻🇳", label: "Tiếng Việt" },
        { code: "id", flag: "🇮🇩", label: "Bahasa Indonesia" },
        { code: "zh-TW", flag: "🇹🇼", label: "繁體中文" },
        { code: "zh-CN", flag: "🇨🇳", label: "简体中文" },
        { code: "ru", flag: "🇷🇺", label: "Русский" },
      ];

      const LEGACY_TEXT_KEYS = ["text", "message", "content", "bannerText"];

      const firebaseConfig = {
        apiKey: "AIzaSyALVVWopHFZzOAd4wqfXQCJJMHNUMk0rd0",
        authDomain: "focusrpg-10da6.firebaseapp.com",
        databaseURL:
          "https://focusrpg-10da6-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "focusrpg-10da6",
        storageBucket: "focusrpg-10da6.firebasestorage.app",
        messagingSenderId: "666978949137",
        appId: "1:666978949137:web:b8946689cd8b287b9df9b0",
        measurementId: "G-K25TTT9PVC",
      };

      const app = initializeApp(firebaseConfig);
      const db = getFirestore(app);
      const bannerRef = doc(db, "settings", "banner");
      const form = document.getElementById("bannerForm");
      const statusEl = document.getElementById("bannerStatus");
      const updateBtn = document.getElementById("updateBannerBtn");

      function setStatus(message, isError = false) {
        statusEl.textContent = message;
        statusEl.classList.toggle("error", isError);
      }

      function renderForm() {
        form.innerHTML = BANNER_LOCALES.map(
          ({ code, flag, label }) => `
            <div class="locale-card">
              <label for="banner-${code}">
                <span class="flag">${flag}</span>
                <span>${label}</span>
                <span class="code">${code}</span>
              </label>
              <textarea
                id="banner-${code}"
                name="${code}"
                placeholder="${label} 공지를 입력하세요"
              ></textarea>
            </div>
          `,
        ).join("");
      }

      function readFormValues() {
        return Object.fromEntries(
          BANNER_LOCALES.map(({ code }) => {
            const field = document.getElementById(`banner-${code}`);
            return [code, field instanceof HTMLTextAreaElement ? field.value.trim() : ""];
          }),
        );
      }

      function fillFormValues(data) {
        const legacyText = LEGACY_TEXT_KEYS.map((key) => data[key]).find(
          (value) => typeof value === "string" && value.trim(),
        );

        for (const { code } of BANNER_LOCALES) {
          const field = document.getElementById(`banner-${code}`);
          if (!(field instanceof HTMLTextAreaElement)) {
            continue;
          }

          const value = typeof data[code] === "string" ? data[code].trim() : "";
          if (value) {
            field.value = value;
            continue;
          }

          if (code === "ko" && typeof legacyText === "string") {
            field.value = legacyText.trim();
          }
        }
      }

      async function loadBanner() {
        const snapshot = await getDoc(bannerRef);
        if (!snapshot.exists()) {
          return;
        }

        fillFormValues(snapshot.data());
      }

      updateBtn.addEventListener("click", async () => {
        const messages = readFormValues();
        const hasAnyMessage = Object.values(messages).some(Boolean);

        if (!hasAnyMessage) {
          setStatus("최소 1개 언어의 공지를 입력해 주세요.", true);
          return;
        }

        updateBtn.disabled = true;
        setStatus("저장 중...");

        try {
          await setDoc(
            bannerRef,
            {
              ...messages,
              enabled: true,
              updatedAt: serverTimestamp(),
            },
            { merge: true },
          );

          setStatus("");
          alert("업데이트 성공!");
        } catch (error) {
          const message =
            error instanceof Error ? error.message : "배너 업데이트에 실패했습니다.";
          setStatus(message, true);
          alert(`업데이트 실패: ${message}`);
        } finally {
          updateBtn.disabled = false;
        }
      });

      renderForm();
      loadBanner().catch((error) => {
        const message =
          error instanceof Error ? error.message : "배너를 불러오지 못했습니다.";
        setStatus(message, true);
      });
    </script>
  </body>
</html>
