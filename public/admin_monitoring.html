<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Focus RPG Admin Monitoring</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #1c1c1f;
        --panel: #282830;
        --border: #3d3d4a;
        --text: #cdd2dc;
        --accent: #5383e8;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: Inter, system-ui, sans-serif;
        background: var(--bg);
        color: var(--text);
      }

      main {
        max-width: 960px;
        margin: 0 auto;
        padding: 32px 20px 64px;
      }

      h1 {
        margin: 0 0 8px;
        color: #fff;
      }

      h2 {
        margin: 0 0 16px;
        color: #fff;
        font-size: 1.125rem;
      }

      p {
        color: #9aa0ae;
        line-height: 1.6;
      }

      section {
        margin-top: 24px;
        padding: 20px;
        border: 1px solid var(--border);
        border-radius: 16px;
        background: var(--panel);
      }

      .auth-row {
        display: grid;
        gap: 12px;
      }

      @media (min-width: 640px) {
        .auth-row {
          grid-template-columns: 1fr auto;
          align-items: end;
        }
      }

      label {
        display: block;
        margin-bottom: 8px;
        font-size: 14px;
        font-weight: 600;
      }

      input,
      textarea,
      button {
        width: 100%;
        border-radius: 12px;
        border: 1px solid var(--border);
        background: #1c1c1f;
        color: #fff;
        font: inherit;
      }

      input,
      textarea {
        padding: 12px 14px;
      }

      .locale-grid {
        display: grid;
        gap: 16px;
      }

      @media (min-width: 640px) {
        .locale-grid {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }
      }

      .locale-card {
        display: flex;
        flex-direction: column;
        gap: 8px;
        padding: 14px;
        border: 1px solid var(--border);
        border-radius: 14px;
        background: #1c1c1f;
      }

      .locale-card label {
        display: flex;
        align-items: center;
        gap: 8px;
        margin: 0;
        font-size: 14px;
        font-weight: 700;
        color: #fff;
      }

      .locale-card .flag {
        font-size: 1.25rem;
        line-height: 1;
      }

      .locale-card .code {
        margin-left: auto;
        font-size: 11px;
        font-weight: 600;
        letter-spacing: 0.08em;
        color: #9aa0ae;
      }

      textarea {
        min-height: 96px;
        resize: vertical;
        background: #121216;
      }

      input:focus,
      textarea:focus {
        outline: none;
        border-color: rgba(83, 131, 232, 0.65);
        box-shadow: 0 0 0 3px rgba(83, 131, 232, 0.15);
      }

      button {
        padding: 14px 16px;
        border: none;
        background: var(--accent);
        font-weight: 700;
        cursor: pointer;
      }

      button:hover {
        filter: brightness(1.08);
      }

      button:disabled {
        opacity: 0.65;
        cursor: wait;
      }

      .auth-row button {
        width: auto;
        min-width: 120px;
      }

      .status {
        margin-top: 12px;
        min-height: 20px;
        font-size: 14px;
      }

      .status.error {
        color: #fca5a5;
      }

      .hint {
        margin-top: 8px;
        font-size: 12px;
        color: #9aa0ae;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Focus RPG Admin Monitoring</h1>
      <p>
        배포 환경에서는 Firestore Rules 때문에 브라우저 직접 저장이 차단됩니다.
        서버 API(<code>/api/admin/banner</code>)를 통해 8개 언어 공지를 저장합니다.
      </p>

      <section>
        <h2>관리자 인증</h2>
        <div class="auth-row">
          <div>
            <label for="adminKey">Admin Key</label>
            <input
              id="adminKey"
              type="password"
              placeholder="Vercel의 ADMIN_BANNER_SECRET 값"
              autocomplete="off"
            />
            <p class="hint">입력한 키는 이 브라우저 sessionStorage에만 저장됩니다.</p>
          </div>
          <button id="saveKeyBtn" type="button">키 저장</button>
        </div>
        <div id="authStatus" class="status"></div>
      </section>

      <section>
        <h2>패치노트 전광판 (8개 국어)</h2>
        <form id="bannerForm" class="locale-grid"></form>
        <button id="updateBannerBtn" type="button">배너 업데이트</button>
        <div id="bannerStatus" class="status"></div>
      </section>
    </main>

    <script type="module">
      const BANNER_LOCALES = [
        { code: "ko", flag: "🇰🇷", label: "한국어" },
        { code: "en", flag: "🇺🇸", label: "English" },
        { code: "ja", flag: "🇯🇵", label: "日本語" },
        { code: "vi", flag: "🇻🇳", label: "Tiếng Việt" },
        { code: "id", flag: "🇮🇩", label: "Bahasa Indonesia" },
        { code: "zh-TW", flag: "🇹🇼", label: "繁體中文" },
        { code: "zh-CN", flag: "🇨🇳", label: "简体中文" },
        { code: "ru", flag: "🇷🇺", label: "Русский" },
      ];

      const ADMIN_KEY_STORAGE = "focus-rpg-admin-banner-key";
      const form = document.getElementById("bannerForm");
      const statusEl = document.getElementById("bannerStatus");
      const authStatusEl = document.getElementById("authStatus");
      const updateBtn = document.getElementById("updateBannerBtn");
      const adminKeyInput = document.getElementById("adminKey");
      const saveKeyBtn = document.getElementById("saveKeyBtn");

      function setStatus(message, isError = false) {
        statusEl.textContent = message;
        statusEl.classList.toggle("error", isError);
      }

      function setAuthStatus(message, isError = false) {
        authStatusEl.textContent = message;
        authStatusEl.classList.toggle("error", isError);
      }

      function getAdminKey() {
        return sessionStorage.getItem(ADMIN_KEY_STORAGE) || "";
      }

      function saveAdminKey() {
        const value = adminKeyInput.value.trim();
        if (!value) {
          setAuthStatus("Admin Key를 입력해 주세요.", true);
          return;
        }

        sessionStorage.setItem(ADMIN_KEY_STORAGE, value);
        adminKeyInput.value = "";
        setAuthStatus("Admin Key가 저장되었습니다.");
      }

      function renderForm() {
        form.innerHTML = BANNER_LOCALES.map(
          ({ code, flag, label }) => `
            <div class="locale-card">
              <label for="banner-${code}">
                <span class="flag">${flag}</span>
                <span>${label}</span>
                <span class="code">${code}</span>
              </label>
              <textarea
                id="banner-${code}"
                name="${code}"
                placeholder="${label} 공지를 입력하세요"
              ></textarea>
            </div>
          `,
        ).join("");
      }

      function readFormValues() {
        return Object.fromEntries(
          BANNER_LOCALES.map(({ code }) => {
            const field = document.getElementById(`banner-${code}`);
            return [code, field instanceof HTMLTextAreaElement ? field.value.trim() : ""];
          }),
        );
      }

      function fillFormValues(messages) {
        for (const { code } of BANNER_LOCALES) {
          const field = document.getElementById(`banner-${code}`);
          if (field instanceof HTMLTextAreaElement) {
            field.value = typeof messages[code] === "string" ? messages[code] : "";
          }
        }
      }

      async function apiFetch(path, options = {}) {
        const adminKey = getAdminKey();
        if (!adminKey) {
          throw new Error("Admin Key가 없습니다. 상단에서 키를 저장해 주세요.");
        }

        const response = await fetch(path, {
          ...options,
          headers: {
            "Content-Type": "application/json",
            Authorization: `Bearer ${adminKey}`,
            ...(options.headers || {}),
          },
        });

        const data = await response.json().catch(() => ({}));
        if (!response.ok) {
          throw new Error(data.error || `Request failed (${response.status})`);
        }

        return data;
      }

      async function loadBanner() {
        if (!getAdminKey()) {
          setAuthStatus("Admin Key를 저장하면 기존 공지를 불러올 수 있습니다.", true);
          return;
        }

        const data = await apiFetch("/api/admin/banner");
        fillFormValues(data.messages || {});
        setStatus("기존 공지를 불러왔습니다.");
      }

      saveKeyBtn.addEventListener("click", () => {
        saveAdminKey();
        loadBanner().catch((error) => {
          setStatus(error instanceof Error ? error.message : "불러오기 실패", true);
        });
      });

      updateBtn.addEventListener("click", async () => {
        const messages = readFormValues();
        const hasAnyMessage = Object.values(messages).some(Boolean);

        if (!hasAnyMessage) {
          setStatus("최소 1개 언어의 공지를 입력해 주세요.", true);
          return;
        }

        updateBtn.disabled = true;
        setStatus("저장 중...");

        try {
          await apiFetch("/api/admin/banner", {
            method: "PUT",
            body: JSON.stringify({ messages }),
          });

          setStatus("");
          alert("업데이트 성공!");
        } catch (error) {
          const message =
            error instanceof Error ? error.message : "배너 업데이트에 실패했습니다.";
          setStatus(message, true);
          alert(`업데이트 실패: ${message}`);
        } finally {
          updateBtn.disabled = false;
        }
      });

      renderForm();

      if (getAdminKey()) {
        setAuthStatus("저장된 Admin Key가 있습니다.");
        loadBanner().catch((error) => {
          setStatus(error instanceof Error ? error.message : "불러오기 실패", true);
        });
      }
    </script>
  </body>
</html>
